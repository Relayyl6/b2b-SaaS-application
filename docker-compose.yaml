version: "3.9"

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pussyli$%ager
      POSTGRES_DB: b2b
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    
  inventory-management:
    build:
      context: .
      dockerfile: rust-backend/inventory-management/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:pussyli%24%25ager@db:5432/b2b
      REDIS_URL: redis://127.0.0.1:6379
      SERVICE_PORT: 3005
      AMQP_ADDR: amqp://guest:guest@rabbitmq:5672/%2f
    depends_on:
      - postgres
      - redis
      - rabbitmq
    ports:
      - "3006:3006"

  user-management:
    build:
      context: .
      dockerfile: rust-backend/user-management/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:pussyli%24%25ager@db:5432/b2b
      REDIS_URL: redis://127.0.0.1:6379
      SERVICE_PORT: 3005
      AMQP_ADDR: amqp://guest:guest@rabbitmq:5672/%2f
    depends_on:
      - postgres
      - redis
      - rabbitmq
    ports:
      - "3004:3004"

  product-catalog:
    build:
      context: .
      dockerfile: rust-backend/product-catalog/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:pussyli%24%25ager@db:5432/b2b
      REDIS_URL: redis://127.0.0.1:6379
      SERVICE_PORT: 3003
      AMQP_ADDR: amqp://guest:guest@rabbitmq:5672/%2f
    depends_on:
      - postgres
      - redis
      - rabbitmq
    ports:
      - "3003:3003"

  order-service:
    build:
      context: .
      dockerfile: rust-backend/order-service/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:pussyli%24%25ager@db:5432/b2b
      REDIS_URL: redis://127.0.0.1:6379
      PORT: 3005
      HOST: 0.0.0.0
    depends_on:
      - postgres
      - redis
    ports:
      - "3005:3005"

  logistics:
    build:
      context: .
      dockerfile: rust-backend/logistics/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:pussyli%24%25ager@db:5432/b2b
      REDIS_URL: redis://127.0.0.1:6379
      SERVICE_PORT: 3008
      AMQP_ADDR: amqp://guest:guest@rabbitmq:5672/%2f
    depends_on:
      - postgres
      - redis
      - rabbitmq
    ports:
      - "3008:3008"

  analytics:
    build:
      context: .
      dockerfile: rust-backend/analytics/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:pussyli%24%25ager@db:5432/b2b
      REDIS_URL: redis://127.0.0.1:6379
      SERVICE_PORT: 3007
      AMQP_ADDR: amqp://guest:guest@rabbitmq:5672/%2f
    depends_on:
      - postgres
      - redis
      - rabbitmq
    ports:
      - "3007:3007"

  api-gateway:
    image: nginx:1.27
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - product-catalog
      - order-service
      - logistics
      - analytics
      - inventory-management
      - user-management
    ports:
      - "8080:8080"

volumes:
  pg_data:
